name: build-sync-image

on:
  workflow_dispatch:
    inputs:
      logseq_ref:
        description: "Upstream Logseq ref (branch, tag, or commit SHA)"
        required: false
        default: ""
      image_tag:
        description: "Optional image tag override"
        required: false
        default: ""
  schedule:
    - cron: "0 4 * * 6"
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - UPSTREAM_DB_SYNC_REF
      - .github/workflows/build-sync-image.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set vars
        id: vars
        shell: bash
        run: |
          owner='${{ github.repository_owner }}'
          tracked_ref="$(tr -d '\r\n' < UPSTREAM_DB_SYNC_REF 2>/dev/null || true)"

          if [[ -n '${{ inputs.logseq_ref }}' ]]; then
            logseq_ref='${{ inputs.logseq_ref }}'
          elif [[ -n "$tracked_ref" ]]; then
            logseq_ref="$tracked_ref"
          else
            logseq_ref='master'
          fi

          if [[ -n '${{ inputs.image_tag }}' ]]; then
            image_tag='${{ inputs.image_tag }}'
          else
            short_ref="${logseq_ref:0:7}"
            image_tag="$(date +%Y%m%d)-${short_ref}"
          fi

          {
            echo "owner=$owner"
            echo "logseq_ref=$logseq_ref"
            echo "image_tag=$image_tag"
            echo 'tags<<EOF'
            echo "ghcr.io/$owner/logseq-sync-server:$image_tag"
            if [[ '${{ github.ref_name }}' == 'main' ]]; then
              echo "ghcr.io/$owner/logseq-sync-server:latest"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            LOGSEQ_REF=${{ steps.vars.outputs.logseq_ref }}
          tags: ${{ steps.vars.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
